services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dbpilot
      POSTGRES_PASSWORD: dbpilot
      POSTGRES_DB: dbpilot
    ports:
      - "5432:5432"
    volumes:
      - dbpilot-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://dbpilot:dbpilot@postgres:5432/dbpilot
      ALLOWED_ORIGINS: http://localhost:3000
      SECRET_KEY: local-dev-secret
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  dbpilot-postgres-data:
