services:
  - type: web
    name: dbpilot-ai-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: BACKEND_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: PRIMARY_PROVIDER
        value: deepseek
      - key: AI_PROVIDER_ORDER
        value: deepseek,gemini,groq,qwen,openrouter
      - key: DEEP_SHEEK_NVIDIA_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: QWEN3_NVIDIA_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: deepseek/deepseek-chat
      - key: ALLOWED_ORIGINS
        value: https://dbpilot-ai.vercel.app
      - key: SECRET_KEY
        generateValue: true
